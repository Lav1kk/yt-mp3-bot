<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>YT → MP3</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #ff3c5f;
    --accent2: #ff7c3c;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --success: #3cffa0;
    --glow: rgba(255,60,95,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80vw;
    height: 80vw;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,60,95,0.07) 0%, transparent 70%);
    animation: drift 12s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -10%;
    width: 60vw;
    height: 60vw;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,124,60,0.06) 0%, transparent 70%);
    animation: drift 16s ease-in-out infinite alternate-reverse;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to { transform: translate(5vw, 5vh) scale(1.1); }
  }

  .app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 32px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 24px var(--glow);
  }
  .logo-text {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Input area */
  .input-section {
    width: 100%;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .input-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 10px;
    display: block;
  }

  .input-wrap {
    position: relative;
    width: 100%;
  }

  .url-input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 52px 16px 18px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: none;
    height: 56px;
    line-height: 1.4;
    overflow: hidden;
  }
  .url-input::placeholder { color: var(--muted); }
  .url-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  .paste-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
    font-size: 18px;
    line-height: 1;
  }
  .paste-btn:hover, .paste-btn:active {
    color: var(--accent);
    background: var(--glow);
  }

  /* Convert button */
  .convert-btn {
    width: 100%;
    margin-top: 16px;
    padding: 17px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(255,60,95,0.3);
    position: relative;
    overflow: hidden;
  }
  .convert-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .convert-btn:active::before { opacity: 1; }
  .convert-btn:active { transform: scale(0.98); }
  .convert-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Status card */
  .status-card {
    width: 100%;
    margin-top: 28px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 24px;
    display: none;
    animation: fadeUp 0.4s ease both;
  }
  .status-card.visible { display: block; }

  /* Loading state */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 8px 0;
  }
  .waveform {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 36px;
  }
  .wave-bar {
    width: 4px;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
    border-radius: 2px;
    animation: wave 1s ease-in-out infinite;
  }
  .wave-bar:nth-child(1) { animation-delay: 0s;    height: 12px; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s;  height: 20px; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s;  height: 28px; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s;  height: 36px; }
  .wave-bar:nth-child(5) { animation-delay: 0.4s;  height: 28px; }
  .wave-bar:nth-child(6) { animation-delay: 0.5s;  height: 20px; }
  .wave-bar:nth-child(7) { animation-delay: 0.6s;  height: 12px; }
  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); opacity: 0.6; }
    50% { transform: scaleY(1); opacity: 1; }
  }
  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-align: center;
  }
  .loading-dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }

  /* Success state */
  .success-state { display: flex; flex-direction: column; gap: 16px; }
  .track-info {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .track-cover {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, #1e1e2e, #2a2a40);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .track-cover::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,60,95,0.15), rgba(255,124,60,0.1));
  }
  .track-meta { flex: 1; min-width: 0; }
  .track-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--success);
    letter-spacing: 1px;
  }
  .track-badge::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 1.5s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .download-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1.5px solid var(--success);
    border-radius: 12px;
    color: var(--success);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
  }
  .download-btn:hover, .download-btn:active {
    background: rgba(60,255,160,0.08);
    transform: scale(0.99);
  }
  .download-btn svg { flex-shrink: 0; }

  /* Error state */
  .error-state {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--accent);
  }
  .error-icon { font-size: 24px; flex-shrink: 0; }
  .error-text { font-size: 13px; line-height: 1.5; }
  .error-text strong { display: block; margin-bottom: 3px; }

  /* History */
  .history-section {
    width: 100%;
    margin-top: 36px;
    animation: fadeUp 0.6s 0.2s ease both;
  }
  .section-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 12px;
    display: block;
  }
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    cursor: pointer;
    transition: border-color 0.2s;
    animation: fadeUp 0.3s ease both;
  }
  .history-item:hover { border-color: var(--muted); }
  .history-item-title {
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .history-item-dl {
    color: var(--muted);
    font-size: 16px;
    flex-shrink: 0;
    text-decoration: none;
    transition: color 0.2s;
  }
  .history-item-dl:hover { color: var(--accent); }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .empty-history {
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🎵</div>
      <span class="logo-text">YT→MP3</span>
    </div>
    <p class="tagline">YouTube to Audio Converter</p>
  </div>

  <!-- Input -->
  <div class="input-section">
    <label class="input-label">YouTube URL</label>
    <div class="input-wrap">
      <input
        type="url"
        class="url-input"
        id="urlInput"
        placeholder="https://youtube.com/watch?v=..."
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
      <button class="paste-btn" id="pasteBtn" title="Вставить">📋</button>
    </div>
    <button class="convert-btn" id="convertBtn" onclick="convert()">
      Конвертировать в MP3
    </button>
  </div>

  <!-- Status card -->
  <div class="status-card" id="statusCard">

    <!-- Loading -->
    <div class="loading-state" id="loadingState">
      <div class="waveform">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      <p class="loading-text">Конвертирую<span class="loading-dots"></span></p>
    </div>

    <!-- Success -->
    <div class="success-state" id="successState" style="display:none">
      <div class="track-info">
        <div class="track-cover">🎵</div>
        <div class="track-meta">
          <div class="track-title" id="trackTitle">Загрузка...</div>
          <span class="track-badge">ОТПРАВЛЕНО В ЧАТ</span>
        </div>
      </div>
      <div class="download-btn" style="cursor:default; border-color: var(--success); color: var(--success);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        MP3 отправлен в чат с ботом
      </div>
    </div>

    <!-- Error -->
    <div class="error-state" id="errorState" style="display:none">
      <div class="error-icon">⚠️</div>
      <div class="error-text">
        <strong>Не удалось конвертировать</strong>
        <span id="errorMsg">Проверь ссылку и попробуй снова</span>
      </div>
    </div>

  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none">
    <span class="section-label">Последние конвертации</span>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<script>
  // ════════════════════════════════════════════
  // CONFIG — вставь свой Webhook URL от n8n сюда
  // ════════════════════════════════════════════
  const N8N_WEBHOOK_URL = 'https://happy090909.app.n8n.cloud/webhook/yt-mp3';
  // ════════════════════════════════════════════

  const tg = window.Telegram?.WebApp;
  let chatId = null;

  if (tg) {
    tg.ready();
    tg.expand();
    // Получаем chat_id пользователя из Telegram
    chatId = tg.initDataUnsafe?.user?.id || null;
  }

  const history = JSON.parse(localStorage.getItem('yt_mp3_history') || '[]');

  // Paste button
  document.getElementById('pasteBtn').addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      document.getElementById('urlInput').value = text;
    } catch {
      document.getElementById('urlInput').focus();
    }
  });

  function showState(state) {
    const card = document.getElementById('statusCard');
    card.classList.add('visible');
    document.getElementById('loadingState').style.display = state === 'loading' ? 'flex' : 'none';
    document.getElementById('successState').style.display = state === 'success' ? 'flex' : 'none';
    document.getElementById('errorState').style.display  = state === 'error'   ? 'flex' : 'none';
  }

  function hideCard() {
    document.getElementById('statusCard').classList.remove('visible');
  }

  function saveHistory(title) {
    history.unshift({ title, ts: Date.now() });
    if (history.length > 10) history.pop();
    localStorage.setItem('yt_mp3_history', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    if (history.length === 0) return;
    const section = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    section.style.display = 'block';
    list.innerHTML = '';
    history.slice(0, 5).forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'history-item';
      div.style.animationDelay = (i * 0.05) + 's';
      div.innerHTML = `<span class="history-item-title">🎵 ${item.title}</span>`;
      list.appendChild(div);
    });
  }

  async function convert() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) {
      document.getElementById('urlInput').focus();
      return;
    }

    const btn = document.getElementById('convertBtn');
    btn.disabled = true;
    btn.textContent = 'Конвертирую...';
    showState('loading');

    // Haptic feedback
    if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

    try {
      const res = await fetch(N8N_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, chatId })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();

      if (!data.success) {
        throw new Error(data.error || 'Неизвестная ошибка');
      }

      // Success!
      document.getElementById('trackTitle').textContent = data.title || 'audio';
      showState('success');
      saveHistory(data.title || 'audio');

      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

    } catch (err) {
      console.error(err);
      document.getElementById('errorMsg').textContent = err.message || 'Проверь ссылку и попробуй снова';
      showState('error');
      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Конвертировать в MP3';
    }
  }

  // Enter key
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') convert();
  });

  // Init history
  renderHistory();
</script>
</body>
</html>
